name: Build & Release

on:
  push:
    tags:
      - 'v[0-9]*'

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip install fastapi "uvicorn[standard]" pydantic python-multipart pyinstaller

      - name: Build backend with PyInstaller
        run: python -m PyInstaller backend/backend.spec --distpath backend-dist --workpath backend-build --noconfirm

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install npm dependencies
        run: npm ci

      - name: Extract changelog for this release
        shell: pwsh
        run: |
          $version = node -p "require('./package.json').version"
          $content = Get-Content CHANGELOG.md -Raw
          $escaped = [regex]::Escape($version)
          $pattern = "(?m)^## \[$escaped\][^\n]*\n([\s\S]*?)(?=^## \[|\z)"
          if ($content -match $pattern) {
            $matches[1].Trim() | Out-File -FilePath release_notes.md -Encoding utf8
          } else {
            "See CHANGELOG.md for details." | Out-File -FilePath release_notes.md -Encoding utf8
          }

      - name: Build and publish release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run build && npx electron-builder --win --publish always

      - name: Set release notes from changelog
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: pwsh
        run: |
          $version = node -p "require('./package.json').version"
          gh release edit "v$version" --notes-file release_notes.md
